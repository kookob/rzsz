name: Release
on:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: zz-linux-x86_64
          - target: x86_64-unknown-linux-musl
            name: zz-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            name: zz-linux-aarch64
          - target: aarch64-unknown-linux-musl
            name: zz-linux-aarch64-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == aarch64-* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
      - run: |
          if [[ "${{ matrix.target }}" == aarch64-unknown-linux-gnu ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          if [[ "${{ matrix.target }}" == aarch64-unknown-linux-musl ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}
      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/zz dist/
          cd dist
          for name in rz sz rrz rsz rb sb rrb rsb rx sx rrx rsx; do
            ln -s zz $name
          done
          tar czhf ../${{ matrix.name }}.tar.gz *
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: ls -R
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            zz-linux-x86_64/zz-linux-x86_64.tar.gz
            zz-linux-x86_64-musl/zz-linux-x86_64-musl.tar.gz
            zz-linux-aarch64/zz-linux-aarch64.tar.gz
            zz-linux-aarch64-musl/zz-linux-aarch64-musl.tar.gz
          generate_release_notes: true
